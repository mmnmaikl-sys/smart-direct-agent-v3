# Railway configuration for smart-direct-agent-v3.
#
# Deploy runs only via GitHub Actions (.github/workflows/deploy.yml) — see Decision 10
# + README WARNING. Local `railway up` is forbidden.
#
# Cron schedules for scheduled jobs (watchdog, smart_optimizer, tg_digest, etc.)
# are added as separate services in subsequent tasks (13, 17, 18, 23, 27).
# Min interval = 5 minutes per Railway Cron docs. In-process loops (lead_poller)
# run inside the main service, not as cron (Decision 9).

[build]
builder = "NIXPACKS"

[deploy]
# healthcheckPath points to /health endpoint created in Task 5 (FastAPI skeleton).
# Until then the service returns 404 on /, which is expected.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# -----------------------------------------------------------------------------
# Cron jobs. Each cron runs as a SEPARATE Railway service with the same code
# but `startCommand` overridden to hit /run/{job}. Registering here documents
# the intent; the actual service config is created in Railway UI once per job.
# Bearer is supplied via $SDA_INTERNAL_API_KEY shared env.
#
# audit_retention — Task 5c, weekly Sunday 00:00 UTC (03:00 МСК). Deletes
# audit_log rows older than 90 days per Decision 13.
# -----------------------------------------------------------------------------
[[cron]]
name = "audit_retention"
schedule = "0 0 * * 0"  # every Sunday 00:00 UTC
command = """
curl -fsS -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/audit_retention?dry_run=false"
"""
