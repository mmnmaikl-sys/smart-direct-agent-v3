# Railway configuration for smart-direct-agent-v3.
#
# Deploy runs only via GitHub Actions (.github/workflows/deploy.yml) — see Decision 10
# + README WARNING. Local `railway up` is forbidden.
#
# Cron schedules for scheduled jobs (watchdog, smart_optimizer, tg_digest, etc.)
# are added as separate services in subsequent tasks (13, 17, 18, 23, 27).
# Min interval = 5 minutes per Railway Cron docs. In-process loops (lead_poller)
# run inside the main service, not as cron (Decision 9).

[build]
builder = "NIXPACKS"

[deploy]
# Start command — uvicorn binds to Railway's $PORT (auto-injected). NIXPACKS
# wouldn't know to run uvicorn against agent_runtime.main:app without this.
startCommand = "uvicorn agent_runtime.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# -----------------------------------------------------------------------------
# Cron jobs. Each cron runs as a SEPARATE Railway service with the same code
# but `startCommand` overridden to hit /run/{job}. Registering here documents
# the intent; the actual service config is created in Railway UI once per job.
# Bearer is supplied via $SDA_INTERNAL_API_KEY shared env.
#
# audit_retention — Task 5c, weekly Sunday 00:00 UTC (03:00 МСК). Deletes
# audit_log rows older than 90 days per Decision 13.
# -----------------------------------------------------------------------------
[[cron]]
name = "audit_retention"
schedule = "0 0 * * 0"  # every Sunday 00:00 UTC
command = """
curl -fsS -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/audit_retention?dry_run=false"
"""

# impact_tracker — Task 12b, every 6 hours. Measures running hypotheses,
# expires runaway rows, releases free budget to waiting hypotheses.
[[cron]]
name = "impact_tracker"
schedule = "0 */6 * * *"  # every 6 hours
command = """
curl -fsS -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/impact_tracker?dry_run=false"
"""

# watchdog — Task 13, hourly dead-man's-switch. Alerts (and, in autonomous,
# suspends PROTECTED campaigns) when any other cron job goes stale >90 min.
[[cron]]
name = "watchdog"
schedule = "0 * * * *"  # every hour on :00
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/watchdog?dry_run=false"
"""

# offline_conversions — Task 24, daily 10:00 МСК (07:00 UTC). Bitrix WON
# deals → Metrika/Direct offline conversion upload; sda_state ring-buffer
# dedup; 152-ФЗ consent gate.
[[cron]]
name = "offline_conversions"
schedule = "0 7 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/offline_conversions?dry_run=false"
"""

# audience_sync — Task 24, weekly Wed 09:00 МСК (06:00 UTC). WON leads →
# MD5-hashed phones → Yandex Audience segment. Consent-gated.
[[cron]]
name = "audience_sync"
schedule = "0 6 * * 3"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/audience_sync?dry_run=false"
"""

# strategy_switcher — Task 26, Mondays 11:00 МСК (08:00 UTC). Reads
# strategy_gate state; on ready_to_switch prepares Strategy + queues ASK
# for owner. No direct mutation (Task 23 approves).
[[cron]]
name = "strategy_switcher"
schedule = "0 8 * * 1"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/strategy_switcher?dry_run=false"
"""

# health_checker — Task 26, daily 13:00 МСК (10:00 UTC). Read-only
# diagnostics: bounce/avg_time/device breakdown via Metrika + landing
# pings. No mutations, just summary report to Telegram.
[[cron]]
name = "health_checker"
schedule = "0 10 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/health_checker?dry_run=false"
"""

# telegram_digest — Task 23, daily 09:00 МСК (06:00 UTC). Rolling 24h
# digest of actions/hypotheses/asks + empty-state "Тихая ночь" footer.
[[cron]]
name = "telegram_digest"
schedule = "0 6 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/telegram_digest?dry_run=false"
"""

# learner — Task 25, weekly Fri 12:00 МСК (09:00 UTC). EMA (default) or
# Bayesian threshold updater over past 7d confirmed/rejected hypotheses.
# Writes sda_state[learned_thresholds] for decision_engine + kill_switches
# overlay consumption.
[[cron]]
name = "learner"
schedule = "0 9 * * 5"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/learner?dry_run=false"
"""

# regression_watch — Task 27, daily 11:00 МСК (08:00 UTC). For each
# state='confirmed' hypothesis with baseline_at_promote, re-measure vs
# baseline; hard verdict → rollback via impact_tracker (autonomous) or
# critical Telegram (shadow/assisted).
[[cron]]
name = "regression_watch"
schedule = "0 8 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/regression_watch?dry_run=false"
"""

# smart_optimizer — Task 18, every 4 hours. Full ReAct loop: signals →
# brain.reason → kill_switches → record_hypothesis → execute per trust overlay.
[[cron]]
name = "smart_optimizer"
schedule = "0 */4 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/smart_optimizer?dry_run=false"
"""

# auto_resume — Task 21, daily 08:00 МСК (05:00 UTC). Resumes PROTECTED
# campaigns auto-suspended by budget_guard/form_checker once conditions clear.
[[cron]]
name = "auto_resume"
schedule = "0 5 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/auto_resume?dry_run=false"
"""

# autotargeting_manager — Task 21, every 3h (offset :50). Keeps ЕПК-Поиск
# autotargeting locked to EXACT + WithoutBrands; drifts → set back.
[[cron]]
name = "autotargeting_manager"
schedule = "50 4-22/3 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/autotargeting_manager?dry_run=false"
"""

# bitrix_feedback — Task 22. Daily per-campaign CPA lead/won via Bitrix
# C45:WON deals + Direct spend; persists history in sda_state for
# decision_engine consumption. Monday 11:30 МСК (08:30 UTC) also resets
# weekly mutations counter inside its SELECT FOR UPDATE window.
[[cron]]
name = "bitrix_feedback"
schedule = "30 8 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/bitrix_feedback?dry_run=false"
"""

# strategy_gate — Task 17, every 3 hours. 4-signal evaluator driving
# learning → ready_to_switch → auto_pilot ⇄ degraded state machine.
[[cron]]
name = "strategy_gate"
schedule = "0 */3 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/strategy_gate?dry_run=false"
"""

# query_analyzer — Task 19, daily 10:00 МСК (07:00 UTC). Regex-first +
# Haiku-fallback classifier on 7-day SEARCH_QUERY_PERFORMANCE_REPORT →
# NEG_KW hypotheses via decision_journal (single writer).
[[cron]]
name = "query_analyzer"
schedule = "0 7 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/query_analyzer?dry_run=false"
"""

# bfl_rf_watchdog — Task 20, every 15 min. 11 thresholds + 6h cooldown for
# the bfl-rf pilot campaign. auto_pilot phase throttles itself to 4h.
[[cron]]
name = "bfl_rf_watchdog"
schedule = "*/15 * * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/bfl_rf_watchdog?dry_run=false"
"""

# shadow_monitor — Task 16b, every 5 min. Last-line contingency: detects any
# is_mutation=TRUE + trust_level='shadow' rows in audit_log. On violation →
# CRITICAL Telegram + FORBIDDEN_LOCK. No-op outside shadow trust.
[[cron]]
name = "shadow_monitor"
schedule = "*/5 * * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/shadow_monitor?dry_run=false"
"""

# form_checker — Task 15, daily 07:00 МСК (04:00 UTC). Health-checks landing
# pages + CORS + /lead endpoint + ad moderation; in shadow NOTIFY only.
[[cron]]
name = "form_checker"
schedule = "0 4 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/form_checker?dry_run=false"
"""

# budget_guard — Task 14, every 30 min 8:00-23:30 МСК. Reads Direct today_cost
# vs daily_avg_7d × 1.5 + absolute DailyBudget ceiling. Hypothesis-aware:
# running hypothesis past its budget_cap concludes cleanly without alert.
# UTC 5-20 = МСК 8-23. 32 ticks/day. Protects ~180K₽/mo prod budget.
[[cron]]
name = "budget_guard"
schedule = "*/30 5-20 * * *"
command = """
curl -fsS --max-time 60 -X POST \
  -H "Authorization: Bearer $SDA_INTERNAL_API_KEY" \
  "$RAILWAY_PUBLIC_URL/run/budget_guard?dry_run=false"
"""
