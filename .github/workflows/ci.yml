name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: Typecheck (pyright)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: pyright
        run: pyright agent_runtime

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      # TODO(Wave 1 Task 5+): raise --cov-fail-under to 80 once agent_runtime has real code.
      # Wave 0 skeleton has only __init__.py, so strict coverage gate is premature.
      - name: pytest
        run: pytest -v --cov=agent_runtime --cov-fail-under=0

  supply-chain-audit:
    name: Supply chain audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Install project deps (for audit)
        run: pip install -e ".[dev]"
      - name: Run pip-audit (HIGH/CRITICAL fail)
        run: pip-audit --strict

  shellcheck:
    name: Shellcheck (scripts/*.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # v2.0.0 SHA-pinned
        with:
          scandir: "./scripts"

  legal-canary:
    name: Legal canary (127-ФЗ/ФАС)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      # TODO(Wave 1 Task 6): replace stub with real 20 canary texts + ≥95% accuracy gate.
      - name: Run legal canary tests
        run: |
          if [ -f tests/legal_canary/test_canary.py ]; then
            pytest tests/legal_canary/ -v
          else
            echo "legal_canary: stub (real canaries land in Wave 1 Task 6)"
          fi

  grill-audit:
    name: Grill audit (12 cases stub)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run grill_audit.sh
        run: bash scripts/grill_audit.sh
