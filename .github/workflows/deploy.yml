name: Deploy to Railway

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build + verify hashes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Verify requirements.lock hashes
        run: |
          if [ ! -f requirements.lock ]; then
            echo "requirements.lock not found — generate via pip-compile --generate-hashes"
            exit 1
          fi
          pip install --require-hashes -r requirements.lock
      - name: pytest (final check before deploy)
        run: pip install -e ".[dev]" && pytest -v

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://smart-direct-agent-v3-production.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: curl -fsSL https://railway.app/install.sh | sh
      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service smart-direct-agent-v3 --detach
      - name: Wait for deployment
        run: sleep 30

  smoke:
    name: Post-deploy smoke test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke_test.sh
        run: bash scripts/smoke_test.sh
